name: moviroo
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  provider: ^6.1.1
  easy_localization: ^3.0.0
  flutter_sound: ^9.2.13     # replaces record — proper namespace, works with modern AGP
  just_audio: ^0.9.40
  path_provider: ^2.1.3
  flutter_tts: ^4.0.2
  http: ^1.2.0
  shared_preferences: ^2.2.3
  speech_to_text: ^7.0.0
  record: ^6.2.0
  fluttertoast: ^8.2.4
  permission_handler: ^11.3.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo66.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/logo66.jpg"

flutter_native_splash:
  color: "#ffffff"
  image: images/logo6.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: scaleAspectFit
  fullscreen: true
  android_12:
    color: "#ffffff"
    image: images/logo6.png

